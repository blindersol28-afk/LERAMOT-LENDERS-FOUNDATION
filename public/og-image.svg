<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006D77;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004D55;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="180" fill="#FF8C42" opacity="0.12" />
  <circle cx="150" cy="550" r="200" fill="#FF8C42" opacity="0.08" />
  <circle cx="1100" cy="500" r="120" fill="#ffffff" opacity="0.05" />

  <!-- Orange accent bar -->
  <rect x="80" y="200" width="8" height="120" rx="4" fill="#FF8C42" />

  <!-- Company name -->
  <text x="112" y="268" font-family="Arial, sans-serif" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Leramot Lenders</text>
  <text x="112" y="338" font-family="Arial, sans-serif" font-size="62" font-weight="700" fill="#FF8C42" letter-spacing="-1">Foundation</text>

  <!-- Tagline -->
  <text x="112" y="410" font-family="Arial, sans-serif" font-size="30" font-weight="400" fill="#ffffff" opacity="0.85">Instant M-PESA loans for Kenyans — apply in minutes.</text>

  <!-- Bottom strip -->
  <rect x="0" y="570" width="1200" height="60" fill="#000000" opacity="0.25" />
  <text x="80" y="608" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" opacity="0.7">leramot-api-production.up.railway.app</text>

  <!-- M-PESA badge -->
  <rect x="950" y="390" width="200" height="56" rx="28" fill="#FF8C42" />
  <text x="1050" y="425" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">M-PESA ✓</text>
</svg>
